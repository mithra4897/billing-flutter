name: billing
description: "Flutter frontend for the Billing ERP platform."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  http: ^1.5.0
  http_parser: ^4.0.0
  shared_preferences: ^2.5.3
  file_picker: ^8.0.0+1
  pdf: ^3.11.3
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
